# JetBrains IDE window rules
# Fix modal windows losing focus when mouse moves away.
# Sway has no per-window focus_follows_mouse, so we disable it globally.
focus_follows_mouse no

# Splash screen - float, center, don't steal focus
for_window [app_id="jetbrains-.*" title="splash"] {
    floating enable
    no_focus
    border none
    move position center
}

# Tooltips and autocomplete popups (title starts with "win") - don't steal focus
for_window [app_id="jetbrains-.*" title="^win"] {
    no_focus
}
